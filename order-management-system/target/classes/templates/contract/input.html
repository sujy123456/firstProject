<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同录入</title>
  <style>
    body { padding: 20px; font-family: "Microsoft YaHei", sans-serif; }
    .form-group { margin: 15px 0; }
    label { display: inline-block; width: 120px; font-weight: bold; }
    input, select, textarea {
      width: 300px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }
    button {
      padding: 8px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover { background: #0056b3; }
    .back-btn { background: #6c757d; }
    .back-btn:hover { background: #5a6268; }
    @media (max-width: 768px) {
      label { width: 100%; margin-bottom: 5px; }
      input, select, textarea { width: 100%; }
    }
  </style>
</head>
<body>
<h2>合同录入</h2>

<form th:action="@{/contract/save}" method="post">
  <!-- 隐藏字段：合同ID -->
  <input type="hidden" name="id" th:value="${contract.id}" />

  <div class="form-group">
    <label>合同名称：</label>
    <input type="text" name="contractName" th:value="${contract.contractName}" required />
  </div>

  <div class="form-group">
    <label>客户名称：</label>
    <input type="text" name="customerName" th:value="${contract.customerName}" readonly />
    <a th:href="@{/customer/select}" target="_blank">
      <button type="button" style="background: #28a745; padding: 4px 10px;">选择客户</button>
    </a>
    <input type="hidden" name="customerId" th:value="${contract.customerId}" />
  </div>

  <div class="form-group">
    <label>合同类型：</label>
    <select name="contractType" required>
      <option value="">请选择</option>
      <option value="产品销售合同" th:selected="${contract.contractType == '产品销售合同'}">产品销售合同</option>
      <option value="服务合同" th:selected="${contract.contractType == '服务合同'}">服务合同</option>
    </select>
  </div>

  <div class="form-group">
    <label>签订日期：</label>
    <!-- 核心修复：LocalDate回显使用#temporals -->
    <input type="date" name="signDate"
           th:value="${contract.signDate != null ? #temporals.format(contract.signDate, 'yyyy-MM-dd') : ''}"
           required />
  </div>

  <div class="form-group">
    <label>交货日期：</label>
    <input type="date" name="deliveryDate"
           th:value="${contract.deliveryDate != null ? #temporals.format(contract.deliveryDate, 'yyyy-MM-dd') : ''}"
           required />
  </div>

  <div class="form-group">
    <label>合同金额：</label>
    <input type="number" step="0.01" name="amount" th:value="${contract.amount}" required />
  </div>

  <div class="form-group">
    <label>合同状态：</label>
    <input type="text" name="status" th:value="${contract.status != null ? contract.status : '草稿'}" readonly />
  </div>

  <div class="form-group">
    <button type="submit">保存草稿</button>
    <a th:href="@{/contract/list}">
      <button type="button" class="back-btn">返回列表</button>
    </a>
  </div>
</form>
</body>
</html>
