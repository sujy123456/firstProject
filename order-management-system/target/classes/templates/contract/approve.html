<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同审批</title>
    <style>
        body {
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 300px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        button {
            padding: 8px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .back-btn {
            background: #6c757d;
        }
        .back-btn:hover {
            background: #5a6268;
        }
        /* 手机端适配 */
        @media (max-width: 768px) {
            label {
                width: 100%;
                margin-bottom: 5px;
            }
            input, select, textarea {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<h2>合同审批</h2>

<form th:action="@{/contract/approve}" method="post">
    <!-- 隐藏字段：合同ID -->
    <input type="hidden" name="id" th:value="${contract.id}" />

    <!-- 合同基本信息（只读） -->
    <div class="form-group">
        <label>合同编号：</label>
        <input type="text" th:value="${contract.contractNo}" readonly />
    </div>
    <div class="form-group">
        <label>合同名称：</label>
        <input type="text" th:value="${contract.contractName}" readonly />
    </div>
    <div class="form-group">
        <label>客户名称：</label>
        <input type="text" th:value="${contract.customerName}" readonly />
    </div>
    <div class="form-group">
        <label>合同金额：</label>
        <input type="text" th:value="${contract.amount}" readonly />
    </div>

    <!-- 审批操作 -->
    <div class="form-group">
        <label>审批结果：</label>
        <select name="status" required>
            <option value="已审批">通过</option>
            <option value="已驳回">驳回</option>
        </select>
    </div>
    <div class="form-group">
        <label>审批备注：</label>
        <textarea name="approvalRemark" rows="4" required placeholder="请输入审批备注（必填）"></textarea>
    </div>

    <!-- 提交/返回按钮 -->
    <div class="form-group">
        <button type="submit">提交审批</button>
        <a th:href="@{/contract/list}">
            <button type="button" class="back-btn">返回列表</button>
        </a>
    </div>
</form>
</body>
</html>
