<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户入网审批</title>
    <style>
        body { padding: 20px; font-family: "Microsoft YaHei"; }
        .form-group { margin: 15px 0; }
        label { display: inline-block; width: 120px; }
        input, textarea { width: 300px; padding: 5px; }
        button { padding: 8px 15px; margin-right: 10px; }
        @media (max-width: 768px) {
            label { width: 100%; margin-bottom: 5px; }
            input, textarea { width: 100%; }
        }
    </style>
</head>
<body>
<h2>客户入网审批</h2>
<form th:action="@{/customer/approve}" method="post">
    <input type="hidden" name="id" th:value="${customer.id}" />

    <div class="form-group">
        <label>客户名称：</label>
        <input type="text" th:value="${customer.name}" readonly />
    </div>
    <div class="form-group">
        <label>审批结果：</label>
        <select name="status" required>
            <option value="已审批">通过</option>
            <option value="已驳回">驳回</option>
        </select>
    </div>
    <div class="form-group">
        <label>审批备注：</label>
        <textarea name="approvalRemark" rows="3" required></textarea>
    </div>

    <button type="submit">提交审批</button>
    <a href="/customer/list">返回列表</a>
</form>
</body>
</html>
