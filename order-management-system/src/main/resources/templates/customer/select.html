<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择客户</title>
    <style>
        body { padding: 20px; font-family: "Microsoft YaHei"; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
<h2>选择客户</h2>
<table>
    <tr>
        <th>客户名称</th>
        <th>客户简称</th>
        <th>联系人</th>
        <th>操作</th>
    </tr>
    <tr th:each="customer : ${customers}">
        <td th:text="${customer.name}"></td>
        <td th:text="${customer.shortName}"></td>
        <td th:text="${customer.contact}"></td>
        <td>
            <a th:href="|@{/contract/selectCustomer(customerId=${customer.id})}|" onclick="window.opener.location.reload();window.close();">选择</a>
        </td>
    </tr>
</table>
</body>
</html>
