<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>开票录入</title>
    <style>
        body { padding: 20px; font-family: "Microsoft YaHei"; }
        .form-group { margin: 15px 0; }
        label { display: inline-block; width: 120px; }
        input, textarea { width: 300px; padding: 8px; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .warning { color: red; font-weight: bold; }
    </style>
</head>
<body>
<h2>开票录入</h2>

<form th:action="@{/invoice/save}" method="post">
    <!-- 隐藏ID：彻底判空，避免null -->
    <input type="hidden" name="id" th:value="${invoice != null ? invoice.id : ''}" />

    <!-- 合同编号 -->
    <div class="form-group">
        <label>合同编号：</label>
        <input type="text" name="contractNo" th:value="${invoice != null ? invoice.contractNo : ''}" required />
        <span class="warning" th:text="${errorMsg}"></span>
    </div>

    <!-- 开票金额 -->
    <div class="form-group">
        <label>开票金额：</label>
        <input type="number" step="0.01" name="invoiceAmount" required />
    </div>

    <!-- 开票日期：简化为普通日期框，避免格式转换问题 -->
    <div class="form-group">
        <label>开票日期：</label>
        <input type="date" name="invoiceDate" />
    </div>

    <!-- 备注 -->
    <div class="form-group">
        <label>备注：</label>
        <textarea name="remark" rows="3" th:text="${invoice != null ? invoice.remark : ''}"></textarea>
    </div>

    <!-- 按钮 -->
    <div class="form-group">
        <button type="submit">保存</button>
        <a th:href="@{/invoice/list}"><button type="button" style="background: #6c757d;">返回</button></a>
    </div>
</form>
</body>
</html>
